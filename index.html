<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>adults reels</title></title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    color:#fff;
    width:90%;
    max-width:420px;
    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:15px;
}

p{
    margin-bottom:25px;
    opacity:.9;
}

.btns{
    display:flex;
    gap:10px;
    justify-content:center;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.yes{
    background:#00d26a;
    color:#fff;
}

.no{
    background:#ff3b3b;
    color:#fff;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
    <h1>Age Verification</h1>
    <p>Are you 18 years old or above<br>Na hoilew pera na<br>De Click</p>

    <div class="btns">
        <button class="yes" onclick="redirectUser()">Yes, I'm 18+horney</button>
        <button class="no" onclick="denyAccess()">No</button>
    </div>
</div>

<script>
function redirectUser(){
    window.location.href = "https://xreels.co/";
}

function denyAccess(){
    document.body.innerHTML = `
    <div style="
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:white;
    font-family:Arial;">
        <h2>Access Restricted - You must be 18+ to continue.</h2>
    </div>`;
}
</script>

</body>
</html>
